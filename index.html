<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0x52686561 | 神圣殉道录 </title>
    <style>
       body {
            margin: 0;
            overflow-x: hidden;
            background-color: #fff; 
            background-image: url('bg.png');
            /* ⭐️ 重点修改：强制宽高自适应，保证无论屏幕多大，图片绝对不拉伸变形，且居中！ */
            background-size: contain; 
            background-position: center center; 
            background-attachment: fixed; /* 固定背景，让视差效果更平滑 */
            color: #000; 
            font-family: sans-serif;
            transition: background-position 0.1s ease-out;
        }

        /* 星星容器 */
        .star-map {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 🌟 星星样式（15px，闪烁） */
        .star {
            position: absolute;
            width: 15px;   
            height: 15px;  
            background: radial-gradient(circle, #fff 10%, #aaa 80%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(100, 100, 100, 0.5); 
            cursor: pointer;
            transition: all 0.3s ease;
            
            /* ✨ 开启闪烁动画 */
            animation: twinkle 2.5s infinite ease-in-out alternate;
        }
        
        /* 闪烁动画 */
        @keyframes twinkle {
            0% { opacity: 0.5; transform: scale(0.9); box-shadow: 0 0 4px rgba(100,100,100,0.3); }
            100% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 12px rgba(100,100,100,0.8); }
        }

        /* 鼠标悬停时的效果 */
        .star:hover {
            transform: scale(1.7) !important;
            box-shadow: 0 0 20px rgba(50, 50, 50, 0.9);
            animation: none; 
            background: radial-gradient(circle, #333, #888); 
        }

        /* 星星上面的文字标签（无边框，半透明白底） */
        .star-label {
            position: absolute;
            top: 25px;    
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8); /* 半透明白底 */
            color: #111; /* 深灰黑字 */
            padding: 6px 16px;
            border: none; /* 彻底不要边框 */
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none; 
            font-size: 14px;
            font-weight: 500; 
            letter-spacing: 1px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); /* 极浅的投影，代替边框 */
        }

        .star:hover .star-label {
            opacity: 1;
        }

        /* 点击后展开的内容区 */
        .content-section {
            display: none; 
            padding: 50px; 
            min-height: 300px;
            background: rgba(255, 255, 255, 0.92); 
            border-top: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
            margin-top: 20px;
            text-align: center; 
            color: #222; 
        }
        .active-section { display: block; }
        
        .content-section h2 {
            color: #000;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <!-- 首页背景星星导航（位置已固定为红圈处） -->
    <div class="star-map">
        <!-- 星星1：小说（左上） -->
        <div class="star" style="top: 30%; left: 32%;" onclick="showSection('novel')">
            <div class="star-label">⚜︎ 圣典与手稿</div>
        </div>
        
        <!-- 星星2：角色（右上） -->
        <div class="star" style="top: 18%; right: 28%;" onclick="showSection('character')">
            <div class="star-label">⚜︎ 殉道者名录</div>
        </div>
        
        <!-- 星星3：势力（左下） -->
        <div class="star" style="bottom: 30%; left: 25%;" onclick="showSection('faction')">
            <div class="star-label">⚜︎ 帝国档案</div>
        </div>
        
        <!-- 星星4：留言（右下） -->
        <div class="star" style="bottom: 25%; right: 28%;" onclick="showSection('guestbook')">
            <div class="star-label">⚜︎ 大祈祷室</div>
        </div>
    </div>

    <!-- 底部铭文区域 -->
    <div style="background: rgba(255, 255, 255, 0.85); padding: 40px 20px; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; text-align: center;">
        <p style="font-size: 20px; letter-spacing: 3px; line-height: 1.8; color: #222; max-width: 700px; margin: 0 auto; font-weight: 300;">
            “帝皇的圣光指引着你，<br>翻阅此卷，见证殉道者的荣光。”
        </p>
        <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #ccc; width: 150px; margin-left: auto; margin-right: auto;">
            <span style="font-size: 13px; color: #666; letter-spacing: 1px;">
                —— 0x52686561 于帝皇圣光之下
            </span>
        </div>
    </div>

    <!-- 内容区域 (点击星星后显示) -->
    <div id="novel" class="content-section">
        <h2>圣典与手稿</h2>
        <p style="color: #444; line-height: 1.6;">关于圣战与殉道者的史诗篇章，皆收录于此。</p>
    </div>
    
    <div id="character" class="content-section">
        <h2>殉道者名录</h2>
        <p style="color: #444; line-height: 1.6;">帝皇忠仆，帝国英魂。每一位登场者的生平与影像将铭刻于此。</p>
    </div>
    
    <div id="faction" class="content-section">
        <h2>帝国档案</h2>
        <p style="color: #444; line-height: 1.6;">每一个势力的崛起与陨落，都伴随着一场震彻星域的战争。</p>
    </div>
    
    <div id="guestbook" class="content-section">
        <h2>大祈祷室</h2>
        <p style="color: #444; line-height: 1.6;">在此向帝皇倾诉，或留下印记。</p>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(el => el.style.display = 'none');
            const target = document.getElementById(id);
            if(target) {
                target.style.display = 'block';
                target.scrollIntoView({ behavior: 'smooth' });
            }
        }

        document.addEventListener('mousemove', function(e) {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            const moveX = x * 2; 
            const moveY = y * 2;
            document.body.style.backgroundPosition = `calc(50% + ${moveX}px) calc(50% + ${moveY}px)`;
        });
    </script>

    <!-- 角落的印记装饰 -->
    <div style="position: fixed; bottom: 20px; right: 20px; color: #444; font-size: 28px; opacity: 0.5; letter-spacing: 5px; pointer-events: none; z-index: 999;">
        <img src="iris.png" style="height: 24px; opacity: 0.7;">
    </div>
</body>
</html>
