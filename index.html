<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0x52686561 | 神圣殉道录</title>
    
    <!-- 引入京华老宋体 (jhlst) -->
    <link rel="stylesheet" href="https://font-now.netlify.app/api/css?url=https://mirrors.ghproxy.com/https://raw.githubusercontent.com/gh-mirrors/chinese-free-web-font-storage/main/packages/jinghua-laosongti/fonts/JingHuaLaoSongTi-Regular.ttf">

    <style>
        /* 彻底禁止 HTML 和 Body 滚动 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        body {
            height: 100vh;
            background-color: #fff; 
            background-image: url('bg.jpg');
            background-size: cover; 
            background-position: center center; 
            background-attachment: fixed; 
            color: #000; 
            
            /*  使用京华老宋体 */
            font-family: 'jhlst', serif; 
            
            transition: background-position 0.1s ease-out;
        }

        /* 星星容器 */
        .star-map {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 图片版黑色星芒（无金光） */
        .star {
            position: absolute;
            width: 42px;
            height: 42px;
            background-image: url('star.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            animation: twinkle 3s infinite ease-in-out alternate;
        }
       
        @keyframes twinkle {
            0% { opacity: 0.5; transform: scale(0.95) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.05) rotate(15deg); }
        }

        .star:hover {
            animation: none; 
            transform: scale(1.25) !important;
            filter: brightness(0.2) contrast(1.5); 
            z-index: 20;
        }
        
        /* 白底黑字卷轴 */
        .star-label {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            
            background: #fff; /* 纯白底 */
            color: #000;      /* 纯黑字 */
            
            padding: 0 20px;
            height: 48px;
            line-height: 48px;
            font-size: 18px;
            letter-spacing: 4px;
            white-space: nowrap;
            text-align: center;
            pointer-events: none;
            
            /* 动画：透明度淡入 */
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        /* 悬停展开 */
        .star:hover .star-label {
            opacity: 1;
        }
        
        /* 弹窗 (Modal) 样式 */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); 
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px); 
        }

        .modal-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            max-width: 600px;
            width: 90%;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            text-align: center;
            color: #222;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            transition: color 0.2s;
            font-weight: bold;
        }
        .modal-close:hover { color: #000; }

        .modal-box h2 { margin-top: 0; margin-bottom: 20px; letter-spacing: 4px; }
        .modal-box p { line-height: 1.8; color: #444; letter-spacing: 1px; }

        /* 底部铭文区域 */
        .bottom-inscription {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 0;
            border-top: 1px solid #ddd;
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 首页背景星星导航 -->
    <div class="star-map">
        <!-- 星星1：小说 -->
        <div class="star" style="top: 32%; left: 34%;" onclick="openModal('novel')">
            <div class="star-label">圣典与手稿</div>
        </div>
        <!-- 星星2：角色 -->
        <div class="star" style="top: 20%; right: 28%;" onclick="openModal('character')">
            <div class="star-label">殉道者名录</div>
        </div>
        <!-- 星星3：势力 -->
        <div class="star" style="bottom: 32%; left: 27%;" onclick="openModal('faction')">
            <div class="star-label">帝国档案</div>
        </div>
        <!-- 星星4：留言 -->
        <div class="star" style="bottom: 22%; right: 30%;" onclick="openModal('guestbook')">
            <div class="star-label">大祈祷室</div>
        </div>
    </div>

    <!-- 底部铭文区域 -->
    <div class="bottom-inscription">
        <p style="font-size: 16px; letter-spacing: 6px; line-height: 1.5; color: #222; max-width: 700px; margin: 0 auto; font-weight: bold;">
            “帝皇的圣光指引着你，<br>翻阅此卷，见证殉道者的荣光。”
        </p>
             <div style="margin-top: 6px; padding-top: 6px; border-top: 1px solid #ccc; width: 60px; margin-left: auto; margin-right: auto;">
            <span style="font-size: 10px; color: #666; letter-spacing: 2px;">
                0x52686561
            </span>
        </div>
    </div>

    <!-- 弹窗容器 -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModalOutside(event)">
        <div class="modal-box">
            <span class="modal-close" onclick="closeModal()">✖</span>
            <h2 id="modalTitle">标题</h2>
            <p id="modalContent">内容</p>
        </div>
    </div>

    <script>
        const modalData = {
            'novel': { title: '圣典与手稿', content: '此卷记载着黑暗纪元中，信仰与怒火交织的史诗篇章。' },
            'character': { title: '殉道者名录', content: '帝皇忠仆，帝国英魂。每一位登场者的生平与影像皆铭刻于此。' },
            'faction': { title: '帝国档案', content: '探秘古老星域中的势力更迭，以及那些隐于阴影中的盟约与叛变。' },
            'guestbook': { title: '大祈祷室', content: '在此向帝皇倾诉，或留下属于你的印记。' }
        };

        function openModal(id) {
            const data = modalData[id];
            if(data) {
                document.getElementById('modalTitle').innerText = data.title;
                document.getElementById('modalContent').innerText = data.content;
                document.getElementById('modalOverlay').style.display = 'flex'; 
                document.body.style.overflow = 'hidden'; 
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'hidden';
        }

        function closeModalOutside(event) {
            if (event.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        }

        // 鼠标视差逻辑
        document.addEventListener('mousemove', function(e) {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            const moveX = x * 2; 
            const moveY = y * 2;
            document.body.style.backgroundPosition = `calc(50% + ${moveX}px) calc(50% + ${moveY}px)`;
        });
    </script>

    <!-- 角落印记 -->
    <div style="position: fixed; bottom: 20px; right: 20px; color: #444; font-size: 28px; opacity: 0.5; letter-spacing: 5px; pointer-events: none; z-index: 999;">
        <img src="iris.png" style="height: 24px; opacity: 0.7;">
    </div>
</body>
</html>
