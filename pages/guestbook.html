<!DOCTYPE html>
<!-- ============================================================
     大祈祷室（留言页）
     风格：黑白线稿 + 祷文卷轴 + 战锤40K神圣感
     ============================================================ -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大祈祷室 | 神圣殉道录</title>

    <!-- 预连接字体服务器，加速加载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap">

    <style>
        /* ===== 全局重置 ===== */
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;   /* 最小高度占满，内容多时可以撑开 */
            background-color: #fafafa;
            background-image: url('../bg.jpg');   /* 背景图和首页共用，../ 表示上一级目录 */
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            color: #111;
            font-family: 'Noto Serif SC', serif;
        }

        /* 横向压缩工具类，和首页保持一致 */
        .scale-x {
            transform: scaleX(0.8);
            transform-origin: center;
            display: inline-block;
        }

        /* ===== 页面整体容器：像一页展开的古老祷文卷轴 ===== */
        .page-wrapper {
            max-width: 720px;              /* 最大宽度，太宽不好读 */
            margin: 0 auto;                /* 水平居中 */
            padding: 40px 24px 80px;       /* 上下左右内边距 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ===== 页面标题 ===== */
        .page-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            position: relative;
        }

        .page-header h1 {
            font-size: 32px;
            letter-spacing: 10px;
            margin: 0 0 10px;
            font-weight: 700;
        }

        .page-header .subtitle {
            font-size: 13px;
            letter-spacing: 4px;
            color: #666;
        }

        /* 标题两侧的装饰线（鸢尾花位置用横线替代，简洁） */
        .page-header::before,
        .page-header::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 60px;
            height: 1px;
            background: #333;
        }
        .page-header::before { left: 0; }
        .page-header::after  { right: 0; }

        /* 返回首页链接 */
        .back-home {
            position: absolute;
            top: 20px;
            left: 24px;
            font-size: 13px;
            letter-spacing: 2px;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .back-home:hover {
            border-bottom-color: #333;
        }

        /* ===== 输入区：顶部固定，类似微博发帖框 ===== */
        .composer {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #222;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 30px;
            position: sticky;      /* 滚动时贴在顶部 */
            top: 16px;
            z-index: 100;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .composer textarea {
            width: 100%;
            min-height: 80px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px 12px;
            font-family: 'Noto Serif SC', serif;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;   /* 只允许垂直方向拖拽放大 */
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
            color: #222;
        }

        .composer textarea:focus {
            border-color: #111;
        }

        .composer-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .composer-hint {
            font-size: 12px;
            color: #999;
            letter-spacing: 1px;
        }

        /* 发送按钮：只用 iris.png 图标，无边框无文字 */
        .send-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        .send-btn img {
            height: 32px;
            width: auto;
        }

        /* ===== 留言列表：时间线式，从新到旧 ===== */
        .comment-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;       /* 每条留言之间的间距 */
        }

        /* Utterances 容器：让它看起来像一张留言卡片 */
        #utterances-container {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #222;
            border-radius: 4px;
            padding: 20px;
            min-height: 200px;   /* 加载前占位高度 */
        }

        /* Utterances 加载前的提示文字 */
        #utterances-container::before {
            content: '正在召唤祈祷室...';
            display: block;
            text-align: center;
            color: #999;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 40px 0;
        }

        /* 加载完成后隐藏提示文字（Utterances 会插入 iframe） */
        #utterances-container:has(iframe)::before {
            display: none;
        }

        /* 单条留言卡片 */
        .comment-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #222;
            border-radius: 4px;
            padding: 18px 20px;
            position: relative;
        }

        /* 留言卡片顶部的装饰角（左上、右下，增加仪式感） */
        .comment-card::before,
        .comment-card::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 1px solid #333;
        }
        .comment-card::before {
            top: 6px;
            left: 6px;
            border-right: none;
            border-bottom: none;
        }
        .comment-card::after {
            bottom: 6px;
            right: 6px;
            border-left: none;
            border-top: none;
        }

        /* 留言头部：头像 + 用户名 + 时间 */
        .comment-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid #333;
            background: #eee;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);   /* 头像转黑白，和整体风格统一 */
        }

        .comment-meta {
            flex: 1;
        }

        .comment-author {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #111;
            margin: 0 0 4px;
        }

        .comment-time {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
        }

        /* 留言正文 */
        .comment-body {
            font-size: 15px;
            line-height: 1.8;
            color: #333;
            margin: 0 0 12px;
            white-space: pre-wrap;    /* 保留换行和空格 */
            word-break: break-word;
            transform: scaleX(0.85);           /* 横向压缩，细长感 */
            transform-origin: left center;     /* 从左侧对齐 */
            letter-spacing: 1px;
        }

        /* 留言底部操作栏：点赞 + 回复 */
        .comment-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
        }

        /* 回复按钮（演示卡片用，Utterances 用自带样式） */
        .reply-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-size: 13px;
            letter-spacing: 2px;
            color: #555;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .reply-btn:hover {
            color: #111;
            background: rgba(0, 0, 0, 0.05);
        }

        /* ===== 回复区（主留言下的回复列表） ===== */
        .reply-list {
            margin-top: 14px;
            padding-left: 16px;
            border-left: 2px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .reply-item {
            background: rgba(250, 250, 250, 0.7);
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px 14px;
            font-size: 14px;
        }

        .reply-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .reply-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid #999;
            overflow: hidden;
            background: #eee;
        }

        .reply-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
        }

        .reply-author {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #222;
        }

        .reply-time {
            font-size: 11px;
            color: #999;
            margin-left: auto;
        }

        .reply-body {
            font-size: 14px;
            line-height: 1.6;
            color: #444;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            transform: scaleX(0.85);           /* 横向压缩，和主留言保持一致 */
            transform-origin: left center;
            letter-spacing: 1px;
        }

        /* 回复输入框：点击"回复"按钮后展开 */
        .reply-composer {
            display: none;    /* 默认隐藏 */
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
        }

        .reply-composer.active {
            display: block;   /* 展开时显示 */
        }

        .reply-composer textarea {
            width: 100%;
            min-height: 60px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px 10px;
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            background: #fff;
            color: #222;
        }

        .reply-composer textarea:focus {
            border-color: #111;
        }

        .reply-composer-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
        }

        .reply-cancel-btn,
        .reply-send-btn {
            padding: 5px 12px;
            border: 1px solid #999;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-size: 12px;
            letter-spacing: 2px;
            color: #555;
            transition: all 0.2s;
        }

        .reply-cancel-btn:hover {
            border-color: #111;
            color: #111;
        }

        .reply-send-btn {
            border-color: #111;
            color: #111;
        }

        .reply-send-btn:hover {
            background: #111;
            color: #fff;
        }

        /* ===== 底部铭文：和首页同格式横条 ===== */
        .bottom-inscription {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 0;
            border-top: 1px solid #ddd;
            text-align: center;
        }

        .inscription-text {
            font-size: 18px;
            letter-spacing: 6px;
            line-height: 1.5;
            color: #222;
            margin: 0 auto;
            font-weight: bold;
            max-width: 700px;
        }

        .signature {
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #ccc;
            width: 60px;
            margin-left: auto;
            margin-right: auto;
        }

        .signature span {
            font-size: 10px;
            color: #666;
            letter-spacing: 2px;
        }

        /* ===== 响应式：移动端 ===== */
        @media (max-width: 640px) {
            .page-wrapper {
                padding: 20px 14px 60px;
            }
            .page-header h1 {
                font-size: 24px;
                letter-spacing: 6px;
            }
            .page-header::before,
            .page-header::after {
                width: 30px;
            }
            .back-home {
                top: 14px;
                left: 14px;
                font-size: 12px;
            }
            .composer {
                padding: 12px;
                top: 10px;
            }
            .comment-card {
                padding: 14px 16px;
            }
            .inscription-text {
                font-size: 14px;
                letter-spacing: 4px;
            }
        }

        /* 尊重用户的减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- 页面整体容器 -->
    <div class="page-wrapper">

        <!-- 返回首页 -->
        <a href="../index.html" class="back-home">« 返回</a>

        <!-- 页面标题 -->
        <header class="page-header">
            <h1><span class="scale-x">大祈祷室</span></h1>
            <div class="subtitle"><span class="scale-x">在此向帝皇倾诉，留下你的印记</span></div>
        </header>

        <!-- ===== 顶部发帖区 ===== -->
        <div class="composer">
            <textarea placeholder="写下你的祷词..." id="mainInput"></textarea>
            <div class="composer-footer">
                <span class="composer-hint">以帝皇之名发言</span>
                <button class="send-btn" id="sendBtn" title="祈祷">
                    <img src="../iris.png" alt="祈祷">
                </button>
            </div>
        </div>

        <!-- ===== 留言列表（从新到旧） =====
             使用 Utterances（基于 GitHub Issues）存储真实留言
             Issue #1 用于存储所有评论 -->
        <div class="comment-list" id="commentList">

            <!-- Utterances 评论容器
                 script 标签会自动在这里渲染评论框和评论列表 -->
            <div id="utterances-container"></div>

        </div>

        <!-- ===== 页脚铭文（和首页同格式横条）===== -->
        <footer class="bottom-inscription">
            <p class="inscription-text">
                <span class="scale-x">“帝皇的圣光，与你同在。”</span>
            </p>
            <div class="signature">
                <span class="scale-x">0x52686561</span>
            </div>
        </footer>

    </div>

    <!-- ===== JavaScript ===== -->
    <script>
        (function () {
            'use strict';

            // =====================================================
            // 接入 Utterances（GitHub Issues 评论系统）
            // 配置说明：
            //   repo          : 你的仓库（owner/repo 格式）
            //   issue-number  : 用于存储评论的 Issue 编号（你在 GitHub 新建的那条 #1）
            //   theme         : 主题（github-light 是白底黑字，和我们风格匹配）
            //   label         : 给评论 Issue 打的标签（可选，方便后台管理）
            // =====================================================

            function initUtterances() {
                var container = document.getElementById('utterances-container');
                if (!container) return;

                var script = document.createElement('script');
                script.src = 'https://utteranc.es/client.js';
                script.setAttribute('repo', '0x52686561/0x52686561.github.io');
                script.setAttribute('issue-number', '1');
                script.setAttribute('theme', 'github-light');
                script.setAttribute('label', '大祈祷室');
                script.setAttribute('crossorigin', 'anonymous');
                script.async = true;

                container.appendChild(script);
            }

            // =====================================================
            // 顶部输入框：点击 iris.png 后平滑滚动到 Utterances 区域
            // （因为 Utterances 自带登录和发评论功能，
            //   我们不能直接提交，只能引导用户滚动到评论区）
            // =====================================================

            function initSendButton() {
                var sendBtn = document.getElementById('sendBtn');
                var mainInput = document.getElementById('mainInput');
                if (!sendBtn) return;

                sendBtn.addEventListener('click', function () {
                    var text = mainInput.value.trim();

                    // 如果用户在顶部输入框写了内容，先把它带到 Utterances 的输入框
                    // （Utterances 加载后会在 iframe 里，跨域无法直接传值，
                    //   所以这里只做滚动引导，让用户自己在下面登录后发布）
                    if (text) {
                        // 复制到剪贴板，方便用户粘贴到下方评论框
                        if (navigator.clipboard) {
                            navigator.clipboard.writeText(text).then(function () {
                                alert('祷词已复制到剪贴板，请滚动到下方评论区登录 GitHub 后粘贴发布。');
                            }).catch(function () {
                                // 复制失败，直接滚动
                            });
                        }
                        mainInput.value = '';
                    }

                    // 平滑滚动到评论区
                    var target = document.getElementById('commentList');
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            }

            // =====================================================
            // 页面加载完成后初始化
            // =====================================================
            document.addEventListener('DOMContentLoaded', function () {
                initUtterances();
                initSendButton();
            });

        })();
    </script>

</body>
</html>
